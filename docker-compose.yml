services:

  dev-chat-backend:
    image: limkanghyun/dev-chat-backend
    container_name: dev-chat-backend
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env
    environment:
      - TZ=Asia/Seoul
    depends_on:
      - prometheus

  dev-chat-frontend:
    image: limkanghyun/dev-chat-frontend
    container_name: dev-chat-frontend
    ports:
      - "3000:80"
    depends_on:
      - dev-chat-backend

  nginx_proxy:
    image: nginx:latest
    container_name: nginx_proxy
    volumes:
      - ./nginx_proxy/nginx.conf:/etc/nginx/nginx.conf
      - /etc/letsencrypt/archive/thedevchat.duckdns.org/fullchain1.pem:/etc/letsencrypt/live/thedevchat.duckdns.org/fullchain.pem:ro
      - /etc/letsencrypt/archive/thedevchat.duckdns.org/privkey1.pem:/etc/letsencrypt/live/thedevchat.duckdns.org/privkey.pem:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - dev-chat-frontend
      - dev-chat-backend

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus-data:/prometheus

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3001:3000"
    volumes:
      - ./grafana-data:/var/lib/grafana
    depends_on:
      - prometheus