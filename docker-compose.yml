services:
  mysql:
    image: mysql:8.0
    container_name: dev-chat-mysql
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=devchat
      - MYSQL_USERNAME=${MYSQL_USERNAME}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - TZ=Asia/Seoul
    volumes:
      - ./mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - dev-chat-network

  dev-chat-frontend:
    image: limkanghyun/dev-chat-frontend:latest
    container_name: dev-chat-frontend
    networks:
      - dev-chat-network

  dev-chat-backend-blue:
    image: limkanghyun/dev-chat-backend:latest
    container_name: dev-chat-backend-blue
    environment:
      - JAVA_OPTS=-Xms512m -Xmx2048m
      - TZ=Asia/Seoul
      - JWT_SECRET=${JWT_SECRET}
      - RDS_USERNAME=${RDS_USERNAME}
      - RDS_PASSWORD=${RDS_PASSWORD}
      - RDS_ENDPOINT=${RDS_ENDPOINT}
      - OAUTH_GITHUB_CLIENT_ID=${OAUTH_GITHUB_CLIENT_ID}
      - OAUTH_GITHUB_SECRET=${OAUTH_GITHUB_SECRET}
      - DOMAIN_URL=${DOMAIN_URL}
      - IMAGE_URL=${IMAGE_URL}
      - WEBHOOK_URL=${WEBHOOK_URL}
      - ENCRYPT_SECRET=${ENCRYPT_SECRET}
      - AWS_ACCESS_KEY=${AWS_ACCESS_KEY}
      - AWS_SECRET_KEY=${AWS_SECRET_KEY}
      - BOT_GITHUB_BOT_PAT=${BOT_GITHUB_BOT_PAT}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - PINECONE_API_KEY=${PINECONE_API_KEY}
      - GEMINI_REVIEW_KEY_1=${GEMINI_REVIEW_KEY_1}
      - GEMINI_REVIEW_KEY_2=${GEMINI_REVIEW_KEY_2}
      - GEMINI_EMBEDDING_KEY_1=${GEMINI_EMBEDDING_KEY_1}
      - GEMINI_EMBEDDING_KEY_2=${GEMINI_EMBEDDING_KEY_2}
      - GEMINI_EMBEDDING_KEY_3=${GEMINI_EMBEDDING_KEY_3}
      - GEMINI_EMBEDDING_KEY_4=${GEMINI_EMBEDDING_KEY_4}
      - GEMINI_EMBEDDING_KEY_5=${GEMINI_EMBEDDING_KEY_5}
    depends_on:
      mysql:
        condition: service_healthy
      prometheus:
        condition: service_started
    networks:
      - dev-chat-network
      - redis-cluster_redis-net

  dev-chat-backend-green:
    image: limkanghyun/dev-chat-backend:latest
    container_name: dev-chat-backend-green
    environment:
      - JAVA_OPTS=-Xms512m -Xmx2048m
      - TZ=Asia/Seoul
      - JWT_SECRET=${JWT_SECRET}
      - RDS_USERNAME=${RDS_USERNAME}
      - RDS_PASSWORD=${RDS_PASSWORD}
      - RDS_ENDPOINT=${RDS_ENDPOINT}
      - OAUTH_GITHUB_CLIENT_ID=${OAUTH_GITHUB_CLIENT_ID}
      - OAUTH_GITHUB_SECRET=${OAUTH_GITHUB_SECRET}
      - DOMAIN_URL=${DOMAIN_URL}
      - IMAGE_URL=${IMAGE_URL}
      - WEBHOOK_URL=${WEBHOOK_URL}
      - ENCRYPT_SECRET=${ENCRYPT_SECRET}
      - AWS_ACCESS_KEY=${AWS_ACCESS_KEY}
      - AWS_SECRET_KEY=${AWS_SECRET_KEY}
      - BOT_GITHUB_BOT_PAT=${BOT_GITHUB_BOT_PAT}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - PINECONE_API_KEY=${PINECONE_API_KEY}
      - GEMINI_REVIEW_KEY_1=${GEMINI_REVIEW_KEY_1}
      - GEMINI_REVIEW_KEY_2=${GEMINI_REVIEW_KEY_2}
      - GEMINI_EMBEDDING_KEY_1=${GEMINI_EMBEDDING_KEY_1}
      - GEMINI_EMBEDDING_KEY_2=${GEMINI_EMBEDDING_KEY_2}
      - GEMINI_EMBEDDING_KEY_3=${GEMINI_EMBEDDING_KEY_3}
      - GEMINI_EMBEDDING_KEY_4=${GEMINI_EMBEDDING_KEY_4}
      - GEMINI_EMBEDDING_KEY_5=${GEMINI_EMBEDDING_KEY_5}
    depends_on:
      mysql:
        condition: service_healthy
      prometheus:
        condition: service_started
    networks:
      - dev-chat-network
      - redis-cluster_redis-net

  nginx_proxy:
    image: nginx:latest
    container_name: nginx_proxy
    volumes:
      - ./deployment/nginx_proxy/nginx.conf:/etc/nginx/nginx.conf
      - ./deployment/nginx_proxy/conf.d:/etc/nginx/conf.d
      - ./www/certbot:/var/www/certbot
      - /etc/letsencrypt:/etc/letsencrypt
    ports:
      - "80:80"
      - "443:443"
    command: ["nginx", "-g", "daemon off;"]
    depends_on:
      - dev-chat-frontend
      - dev-chat-backend-blue
      - dev-chat-backend-green
    networks:
      - dev-chat-network

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus-data:/prometheus
    networks:
      - dev-chat-network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3002:3000"
    volumes:
      - ./grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - dev-chat-network

networks:
  dev-chat-network:
    driver: bridge
  redis-cluster_redis-net:
    external: true
    name: redis-sentinel_redis-net
