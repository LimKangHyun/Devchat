services:

  dev-chat-backend-blue:
    image: limkanghyun/dev-chat-backend:blue
    container_name: dev-chat-backend-blue
    ports:
      - "8081:8080" # 내부는 8080이지만 외부는 8082
    environment:
      - TZ=Asia/Seoul
      - JWT_SECRET=${JWT_SECRET}
      - RDS_USERNAME=${RDS_USERNAME}
      - RDS_PASSWORD=${RDS_PASSWORD}
      - RDS_ENDPOINT=${RDS_ENDPOINT}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - OAUTH_GITHUB_CLIENT_ID=${OAUTH_GITHUB_CLIENT_ID}
      - OAUTH_GITHUB_SECRET=${OAUTH_GITHUB_SECRET}
      - DOMAIN_URL=${DOMAIN_URL}
      - IMAGE_URL=${IMAGE_URL}
      - WEBHOOK_URL=${WEBHOOK_URL}
      - AWS_ACCESS_KEY=${AWS_ACCESS_KEY}
      - AWS_SECRET_KEY=${AWS_SECRET_KEY}
    depends_on:
      - prometheus
    networks:
      - dev-chat-network

  dev-chat-backend-green:
    image: limkanghyun/dev-chat-backend:green
    container_name: dev-chat-backend-green
    ports:
      - "8082:8080"  # 내부는 8080이지만 외부는 8082
    environment:
      - TZ=Asia/Seoul
      - JWT_SECRET=${JWT_SECRET}
      - RDS_USERNAME=${RDS_USERNAME}
      - RDS_PASSWORD=${RDS_PASSWORD}
      - RDS_ENDPOINT=${RDS_ENDPOINT}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - OAUTH_GITHUB_CLIENT_ID=${OAUTH_GITHUB_CLIENT_ID}
      - OAUTH_GITHUB_SECRET=${OAUTH_GITHUB_SECRET}
      - DOMAIN_URL=${DOMAIN_URL}
      - IMAGE_URL=${IMAGE_URL}
      - WEBHOOK_URL=${WEBHOOK_URL}
      - AWS_ACCESS_KEY=${AWS_ACCESS_KEY}
      - AWS_SECRET_KEY=${AWS_SECRET_KEY}
    depends_on:
      - prometheus
    networks:
      - dev-chat-network

  dev-chat-frontend-blue:
    image: limkanghyun/dev-chat-frontend:blue
    container_name: dev-chat-frontend-blue
    ports:
      - "3000:80"
    networks:
      - dev-chat-network

  dev-chat-frontend-green:
    image: limkanghyun/dev-chat-frontend:green
    container_name: dev-chat-frontend-green
    ports:
      - "3001:80"
    networks:
      - dev-chat-network

  nginx_proxy:
    image: nginx:latest
    container_name: nginx_proxy
    volumes:
      - ./nginx_proxy/nginx.conf:/etc/nginx/nginx.conf
      - /etc/letsencrypt/archive/thedevchat.duckdns.org/fullchain1.pem:/etc/letsencrypt/live/thedevchat.duckdns.org/fullchain.pem:ro
      - /etc/letsencrypt/archive/thedevchat.duckdns.org/privkey1.pem:/etc/letsencrypt/live/thedevchat.duckdns.org/privkey.pem:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - dev-chat-frontend-blue
      - dev-chat-frontend-green
      - dev-chat-backend-blue
      - dev-chat-backend-green
    networks:
      - dev-chat-network

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus-data:/prometheus
    networks:
      - dev-chat-network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3002:3000"
    volumes:
      - ./grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - dev-chat-network

networks:
  dev-chat-network:
    driver: bridge
