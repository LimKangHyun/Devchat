version: "3.8"
services:
  mysql:
    image: mysql:8.0
    container_name: dev-chat-mysql
    restart: unless-stopped
    env_file:
      - /home/ubuntu/Devchat/.env
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=devchat
      - MYSQL_USER=${MYSQL_USERNAME}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - dev-chat-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-u", "root", "-p${MYSQL_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis-stream:
    image: redis:7
    container_name: redis-stream
    restart: unless-stopped
    ports:
      - "6381:6379"
    networks:
      - dev-chat-network

  dev-chat-frontend:
    image: limkanghyun/dev-chat-frontend:latest
    container_name: dev-chat-frontend
    networks:
      - dev-chat-network

  dev-chat-backend-blue:
    image: limkanghyun/dev-chat-backend:latest
    container_name: dev-chat-backend-blue
    env_file:
      - /home/ubuntu/Devchat/.env
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - MYSQL_USERNAME=${MYSQL_USERNAME}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - RDS_ENDPOINT=${RDS_ENDPOINT}
      - INTERNAL_JWT_SECRET=${INTERNAL_JWT_SECRET}
      - STREAM_REDIS_HOST=redis-stream
      - STREAM_REDIS_PORT=6379
    networks:
      - dev-chat-network
      - redis-sentinel_redis-net
    depends_on:
      mysql:
        condition: service_healthy
      redis-stream:
        condition: service_started

  dev-chat-backend-green:
    image: limkanghyun/dev-chat-backend:latest
    container_name: dev-chat-backend-green
    env_file:
      - /home/ubuntu/Devchat/.env
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - MYSQL_USERNAME=${MYSQL_USERNAME}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - RDS_ENDPOINT=${RDS_ENDPOINT}
      - INTERNAL_JWT_SECRET=${INTERNAL_JWT_SECRET}
      - STREAM_REDIS_HOST=redis-stream
      - STREAM_REDIS_PORT=6379
    networks:
      - dev-chat-network
      - redis-sentinel_redis-net
    depends_on:
      mysql:
        condition: service_healthy
      redis-stream:
        condition: service_started

  dev-chat-ai:
    image: limkanghyun/dev-chat-ai:latest
    container_name: dev-chat-ai
    restart: unless-stopped
    env_file:
      - /home/ubuntu/Devchat/.env
    environment:
      - INTERNAL_JWT_SECRET=${INTERNAL_JWT_SECRET}
      - INTERNAL_API_URL=${INTERNAL_API_URL}
      - GEMINI_REVIEW_KEY_1=${GEMINI_REVIEW_KEY_1}
      - GEMINI_REVIEW_KEY_2=${GEMINI_REVIEW_KEY_2}
      - GEMINI_EMBEDDING_KEY_1=${GEMINI_EMBEDDING_KEY_1}
      - GEMINI_EMBEDDING_KEY_2=${GEMINI_EMBEDDING_KEY_2}
      - GEMINI_EMBEDDING_KEY_3=${GEMINI_EMBEDDING_KEY_3}
      - GEMINI_EMBEDDING_KEY_4=${GEMINI_EMBEDDING_KEY_4}
      - GEMINI_EMBEDDING_KEY_5=${GEMINI_EMBEDDING_KEY_5}
      - PINECONE_API_KEY=${PINECONE_API_KEY}
    networks:
      - dev-chat-network
    depends_on:
      - redis-stream
    stop_grace_period: 600s

  nginx_proxy:
    image: nginx:latest
    container_name: nginx_proxy
    volumes:
      - ./deployment/nginx_proxy/nginx.conf:/etc/nginx/nginx.conf
      - /etc/letsencrypt:/etc/letsencrypt
      - ./www/certbot:/var/www/certbot
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - dev-chat-frontend
      - dev-chat-backend-blue
      - dev-chat-backend-green
    networks:
      - dev-chat-network

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - dev-chat-network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3002:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SERVER_ROOT_URL=https://thedevchat.duckdns.org/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    depends_on:
      - prometheus
    networks:
      - dev-chat-network

networks:
  dev-chat-network:
    driver: bridge
    name: dev-chat-network
  redis-sentinel_redis-net:
    external: true

volumes:
  mysql-data:
  grafana-data:
  prometheus-data:
