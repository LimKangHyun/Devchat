version: '3'

services:

  backend:
    image: limkanghyun/dev_chat
    container_name: backend_container
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env
    depends_on:
      - prometheus

  frontend:
    image: limkanghyun/dev_chat
    container_name: frontend_container
    ports:
      - "3000:80"  # React를 nginx로 서빙하고 있다면 80포트
    depends_on:
      - backend

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    user: "501:20"
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus-data:/prometheus

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    user: "501:20"
    ports:
      - "3001:3000"
    volumes:
      - ./grafana-data:/var/lib/grafana
    depends_on:
      - prometheus


