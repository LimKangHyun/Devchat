services:
  mysql:
    image: mysql:8.0
    container_name: dev-chat-mysql
    restart: unless-stopped
    env_file:
      - /home/ubuntu/Devchat/.env
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=devchat
      - MYSQL_USER=${MYSQL_USERNAME}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    volumes:
      - ./mysql-data:/var/lib/mysql
    networks:
      - dev-chat-network

  dev-chat-frontend:
    image: limkanghyun/dev-chat-frontend:latest
    container_name: dev-chat-frontend
    networks:
      - dev-chat-network

  dev-chat-backend-blue:
    image: limkanghyun/dev-chat-backend:latest
    container_name: dev-chat-backend-blue
    env_file:
      - /home/ubuntu/Devchat/.env
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - MYSQL_USERNAME=${MYSQL_USERNAME}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - RDS_ENDPOINT=${RDS_ENDPOINT}
    networks:
      - dev-chat-network
      - redis-sentinel_redis-net

  dev-chat-backend-green:
    image: limkanghyun/dev-chat-backend:latest
    container_name: dev-chat-backend-green
    env_file:
      - /home/ubuntu/Devchat/.env
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - MYSQL_USERNAME=${MYSQL_USERNAME}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - RDS_ENDPOINT=${RDS_ENDPOINT}
    networks:
      - dev-chat-network
      - redis-sentinel_redis-net

  nginx_proxy:
    image: nginx:latest
    container_name: nginx_proxy
    volumes:
      - ./deployment/nginx_proxy/nginx.conf:/etc/nginx/nginx.conf
      - /etc/letsencrypt:/etc/letsencrypt
    ports:
      - "80:80"
      - "443:443"
    networks:
      - dev-chat-network
      
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus-data:/prometheus
    networks:
      - dev-chat-network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3002:3000"
    volumes:
      - ./grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - dev-chat-network

networks:
  dev-chat-network:
    driver: bridge
  redis-sentinel_redis-net:
    external: true
