server:
  address: 0.0.0.0
  port: 443
  ssl:
    key-store: classpath:keystore.p12
    key-store-password: ^^lkh0218
    key-store-type: PKCS12
    key-alias: spring

spring:
  session:
    store-type: none

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${RDS_USERNAME}
    password: ${RDS_PASSWORD}
    url: jdbc:mysql://${RDS_ENDPOINT}:3306/FLYING_TRUCK_PROJECT

  flyway:
    enabled: false
    baseline-on-migrate: true
    locations: classpath:db/migration

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}

  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_SECRET}
            redirect-uri: https://52.79.249.87/login/oauth2/code/github
            scope:
              - repo
              - admin:repo_hook
              - user
        provider:
          github:
            user-name-attribute: login
  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        show_sql: true
        format_sql: true

file:
  images:
    profile:
      path: images/profile/
      default: default-profile.png
      github: github-profile.png
    chat:
      path: images/chat/

github:
  username: GitHubBot

url:
  spring-url: ${SPRING_URL}
  react-url: ${REACT_URL}
  image-url: ${IMAGE_URL}

cloud:
  aws:
    credentials:
      access-key: ${AWS_ACCESS_KEY}
      secret-key: ${AWS_SECRET_KEY}
    region:
      static: ap-northeast-2
    s3:
      bucket: devchatimage


jwt:
  redirection:
    base: ${REACT_URL}

  info:
    issuer: "대한민국26세 달성 배씨 배문성의 허가가 있는 토큰이올시다."
    secret: 36b2294c1079470409d860ac57402fc152524d134a75b7cb223d92644b63adba980d90dcefd0d53c02a5cbb43c2678d49128dae2299f652f5f71033fee640686

logging:
  level:
    org.springframework.security: DEBUG
