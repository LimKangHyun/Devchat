springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui
    config-url: /v3/api-docs/swagger-config
    url: /v3/api-docs

server:
  shutdown: graceful

spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s
  session:
    store-type: none

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${RDS_USERNAME}
    password: ${RDS_PASSWORD}
    url: jdbc:mysql://${RDS_ENDPOINT}:3306/FLYING_TRUCK_PROJECT

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  data:
    redis:
      sentinel:
        master: mymaster
        nodes: sentinel1:26379,sentinel2:26379,sentinel3:26379
      timeout: 500ms
      connect-timeout: 500ms
      lettuce:
        shutdown-timeout: 500ms
  
  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${OAUTH_GITHUB_CLIENT_ID}
            client-secret: ${OAUTH_GITHUB_SECRET}
            redirect-uri: https://thedevchat.duckdns.org/api/login/oauth2/code/github
            scope:
              - repo
              - admin:repo_hook
              - user
        provider:
          github:
            user-name-attribute: login
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        show_sql: true
        format_sql: true

resilience4j:
  circuitbreaker:
    instances:
      redis:
        # CLOSED → OPEN 전환 기준
        failure-rate-threshold: 50              # 실패율 50% 초과 시 OPEN
        minimum-number-of-calls: 10              # 최소 10번 호출 후 실패율 계산
        sliding-window-size: 20                 # 최근 20개 요청 기준
        sliding-window-type: COUNT_BASED        # 횟수 기반
        # OPEN → HALF_OPEN 전환 기준
        wait-duration-in-open-state: 30s        # 30초 후 HALF_OPEN
        # HALF_OPEN → CLOSED 전환 기준
        permitted-number-of-calls-in-half-open-state: 3  # 3개 요청 테스트
        # 느린 호출 기준
        slow-call-rate-threshold: 80            # 느린 호출 80% 초과 시 OPEN
        slow-call-duration-threshold: 500ms        # 500ms 이상이면 느린 호출
        # 예외 처리
        record-exceptions:
          - org.springframework.data.redis.RedisConnectionFailureException
          - io.lettuce.core.RedisException
          - java.util.concurrent.TimeoutException
          - org.springframework.dao.QueryTimeoutException
        ignore-exceptions:
          - project.backend.global.exception.ex.ChatRoomException
          - project.backend.global.exception.ex.ChatMessageException

file:
  images:
    profile:
      path: images/profile/
      default: default-profile.png
      github: github-profile.png
    chat:
      path: images/chat/

github:
  username: GitHubBot

url:
  domain-url: ${DOMAIN_URL}
  image-url: ${IMAGE_URL}
  webhook-url: ${WEBHOOK_URL}

cloud:
  aws:
    credentials:
      access-key: ${AWS_ACCESS_KEY}
      secret-key: ${AWS_SECRET_KEY}
    region:
      static: ap-northeast-2
    s3:
      bucket: devchatimage


jwt:
  redirection:
    base: ${DOMAIN_URL}

  info:
    secret: ${JWT_SECRET}

logging:
  level:
    org.springframework.security: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
  security:
    enabled: false