spring:
  session:
    store-type: none

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${RDS_USERNAME}
    password: ${RDS_PASSWORD}
    url: jdbc:mysql://localhost:3306/devchat

  flyway:
    enabled: false
    baseline-on-migrate: true
    locations: classpath:db/migration

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  profiles:
    active: dev

  data:
    redis:
      host: localhost
      port: 6379

  security:
    oauth2:
      client:
        registration:
          github:
            client-id: Ov23liAW2nSSgyjHwXMO
            client-secret: c042dad098e74b9d0037927245d5a7e0faf31397
            scope:
              - repo
              - admin:repo_hook
              - user
        provider:
          github:
            user-name-attribute: login
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        show_sql: true
        format_sql: true

file:
  images:
    profile:
      path: images/profile/
      default: default-profile.png
      github: github-profile.png
      ai-reviewer: devchat_code_reviewer.webp
    chat:
      path: images/chat/

github:
  username: GitHubBot
  bot:
    pat: ${BOT_GITHUB_BOT_PAT}
    username: Devchat-Code-Assist

gemini:
  review-api-keys:
    - ${GEMINI_REVIEW_KEY_1}
    - ${GEMINI_REVIEW_KEY_2}
  embedding-api-keys:
    - ${GEMINI_EMBEDDING_KEY_1}
    - ${GEMINI_EMBEDDING_KEY_2}
    - ${GEMINI_EMBEDDING_KEY_3}
    - ${GEMINI_EMBEDDING_KEY_4}
    - ${GEMINI_EMBEDDING_KEY_5}

pinecone:
  api-key: ${PINECONE_API_KEY}
  index-name: devchat

url:
  domain-url: ${DOMAIN_URL}
  image-url: ${IMAGE_URL}
  webhook-url: ${WEBHOOK_URL}

cloud:
  aws:
    credentials:
      access-key: ${AWS_ACCESS_KEY}
      secret-key: ${AWS_SECRET_KEY}
    region:
      static: ap-northeast-2
    s3:
      bucket: devchat-images

jwt:
  redirection:
    base: ${DOMAIN_URL}
  info:
    secret: ${JWT_SECRET}

encrypt:
  secret: dsfgf

  info:
