spring:
  session:
    store-type: none

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver

  flyway:
    baseline-on-migrate: true
    locations: classpath:db/migration

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  security:
    oauth2:
      client:
        provider:
          github:
            user-name-attribute: login

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        show_sql: false
        format_sql: false

file:
  images:
    profile:
      path: images/profile/
      default: default-profile.png
      github: github-profile.png
      ai-reviewer: devchat_code_reviewer.webp
    chat:
      path: images/chat/

github:
  username: GitHubBot
  bot:
    username: Devchat-Code-Assist

logging:
  file:
    name: logs/app.log