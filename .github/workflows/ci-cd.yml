name: CI/CD
on:
  push:
    branches: [ "prod" ]
  pull_request:
    branches: [ "prod" ]
  workflow_dispatch:

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install & Build
        env:
          REACT_APP_BASE_API_URL: ${{ secrets.REACT_APP_BASE_API_URL }}
          REACT_APP_WEB_SOCKET_URL: ${{ secrets.REACT_APP_WEB_SOCKET_URL }}
          REACT_APP_PROFILE_IMAGE_URL: ${{ secrets.REACT_APP_PROFILE_IMAGE_URL }}
          CI: false
        run: |
          npm ci
          npm run build

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Docker build & push
        uses: docker/build-push-action@v5
        with:
          context: frontend
          platforms: linux/arm64
          push: true
          tags: limkanghyun/dev-chat-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  backend:
    runs-on: ubuntu-latest
    env:
      RDS_USERNAME: ${{ secrets.RDS_USERNAME }}
      RDS_PASSWORD: ${{ secrets.RDS_PASSWORD }}
      RDS_ENDPOINT: ${{ secrets.RDS_ENDPOINT }}
      OAUTH_GITHUB_CLIENT_ID: ${{ secrets.OAUTH_GITHUB_CLIENT_ID }}
      OAUTH_GITHUB_SECRET: ${{ secrets.OAUTH_GITHUB_SECRET }}
      DOMAIN_URL: ${{ secrets.DOMAIN_URL }}
      IMAGE_URL: ${{ secrets.IMAGE_URL }}
      WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
      AWS_ACCESS_KEY: ${{ secrets.AWS_ACCESS_KEY }}
      AWS_SECRET_KEY: ${{ secrets.AWS_SECRET_KEY }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
      GEMINI_REVIEW_KEY_1: ${{ secrets.GEMINI_REVIEW_KEY_1 }}
      GEMINI_REVIEW_KEY_2: ${{ secrets.GEMINI_REVIEW_KEY_2 }}
      GEMINI_EMBEDDING_KEY_1: ${{ secrets.GEMINI_EMBEDDING_KEY_1 }}
      GEMINI_EMBEDDING_KEY_2: ${{ secrets.GEMINI_EMBEDDING_KEY_2 }}
      GEMINI_EMBEDDING_KEY_3: ${{ secrets.GEMINI_EMBEDDING_KEY_3 }}
      GEMINI_EMBEDDING_KEY_4: ${{ secrets.GEMINI_EMBEDDING_KEY_4 }}
      GEMINI_EMBEDDING_KEY_5: ${{ secrets.GEMINI_EMBEDDING_KEY_5 }}
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Gradle 캐시
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - run: chmod +x ./gradlew

      - name: Test
        run: ./gradlew test

      - name: Build
        run: ./gradlew clean build -x test

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Docker build & push
        uses: docker/build-push-action@v5
        with:
          context: backend
          platforms: linux/arm64
          push: true
          tags: limkanghyun/dev-chat-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
  deploy:
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    if: github.ref == 'refs/heads/prod'
    steps:
      - name: SSH 배포
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/Devchat
            git pull origin prod
            chmod +x ./scripts/deploy_hook.sh
            ./scripts/deploy_hook.sh
