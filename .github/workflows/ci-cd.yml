name: CI/CD
on:
  push:
    branches: [ "prod" ]
  pull_request:
    branches: [ "prod" ]
  workflow_dispatch:

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install & Build
        env:
          REACT_APP_BASE_API_URL: ${{ secrets.REACT_APP_BASE_API_URL }}
          REACT_APP_WEB_SOCKET_URL: ${{ secrets.REACT_APP_WEB_SOCKET_URL }}
          REACT_APP_PROFILE_IMAGE_URL: ${{ secrets.REACT_APP_PROFILE_IMAGE_URL }}
          CI: false
        run: |
          npm ci
          npm run build

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Docker build & push
        uses: docker/build-push-action@v5
        with:
          context: frontend
          platforms: linux/arm64
          push: true
          tags: limkanghyun/dev-chat-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  backend:
    runs-on: ubuntu-latest
    env:
      MYSQL_USERNAME: ${{ secrets.MYSQL_USERNAME }}
      MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
      RDS_ENDPOINT: ${{ secrets.RDS_ENDPOINT }}
      OAUTH_GITHUB_CLIENT_ID: ${{ secrets.OAUTH_GITHUB_CLIENT_ID }}
      OAUTH_GITHUB_SECRET: ${{ secrets.OAUTH_GITHUB_SECRET }}
      DOMAIN_URL: ${{ secrets.DOMAIN_URL }}
      IMAGE_URL: ${{ secrets.IMAGE_URL }}
      WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
      AWS_ACCESS_KEY: ${{ secrets.AWS_ACCESS_KEY }}
      AWS_SECRET_KEY: ${{ secrets.AWS_SECRET_KEY }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      INTERNAL_JWT_SECRET: ${{ secrets.INTERNAL_JWT_SECRET }}
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Gradle 캐시
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - run: chmod +x ./gradlew

      - name: Test
        run: ./gradlew test

      - name: Build
        run: ./gradlew :devchat-api:build -x test

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Docker build & push
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: backend/Dockerfile
          platforms: linux/arm64
          push: true
          tags: limkanghyun/dev-chat-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  backend-ai:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Gradle 캐시
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - run: chmod +x ./gradlew

      - name: Build
        run: ./gradlew :devchat-ai:build -x test

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Docker build & push
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: backend/devchat-ai/Dockerfile
          platforms: linux/arm64
          push: true
          tags: limkanghyun/dev-chat-ai:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: [frontend, backend, backend-ai]
    if: github.ref == 'refs/heads/prod'
    steps:
      - name: SSH 배포
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ubuntu
          key: ${{ secrets.OCI_SSH_KEY }}
          script: |
            cd /home/ubuntu/Devchat
            
            # 권한 문제 해결
            sudo chown -R ubuntu:ubuntu .
            # 로컬 변경 무시하고 강제 최신화
            git fetch origin
            git reset --hard origin/prod

            # 실행 권한
            chmod +x ./scripts/deploy_hook.sh

            # 실행
            ./scripts/deploy_hook.sh
            
      - name: Notify Discord
        if: always()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          status: ${{ job.status }}
          title: "DevChat 배포"
          description: |
            브랜치: ${{ github.ref_name }}
            커밋: ${{ github.event.head_commit.message }}
            배포자: ${{ github.actor }}
          color: ${{ job.status == 'success' && '0x00ff00' || '0xff0000' }}
          username: "DevChat Bot"
