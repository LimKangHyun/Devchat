name: CI/CD

on:
  push:
    branches: [ "test-1" ]
  pull_request:
    branches: [ "test-1" ]
  workflow_dispatch:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - run: chmod +x ./gradlew
      - run: ./gradlew clean build -x test

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker build image (backend)
        run: docker build --platform linux/amd64 -t limkanghyun/dev-chat-backend .
      - name: Docker push backend image
        run: docker push limkanghyun/dev-chat-backend

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22
      - run: npm install
      - run: CI=false npm run build
      - run: npm test -- --passWithNoTests

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker build image(frontend)
        run: docker build --platform linux/amd64 -t limkanghyun/dev-chat-frontend .
      - name: Docker push frontend image
        run: docker push limkanghyun/dev-chat-frontend

  deploy:
  runs-on: ubuntu-latest
  needs: [ backend, frontend]

  steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Copy deployment files to EC2
      uses: appleboy/scp-action@v0.1.4
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_PRIVATE_KEY }}
        source: "deployment/*"
        target: "~/NBE5-7-2-TEAM08/deployment"

    - name: Deploy to EC2 via SSH
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_PRIVATE_KEY }}
        script: |
          cd ~/NBE5-7-2-TEAM08/deployment
          chmod +x ./deploy.sh
          ./deploy.sh
        # 중단방식
        # script: |
        #   cd ~/NBE5-7-2-TEAM08
        #   docker-compose pull
        #   docker-compose down
        #   docker-compose up -d --build
