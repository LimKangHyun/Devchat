name: CI/CD
on:
  push:
    branches: [ "prod" ]
  pull_request:
    branches: [ "prod" ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      RDS_USERNAME: ${{ secrets.RDS_USERNAME }}
      RDS_PASSWORD: ${{ secrets.RDS_PASSWORD }}
      RDS_ENDPOINT: ${{ secrets.RDS_ENDPOINT }}
      OAUTH_GITHUB_CLIENT_ID: ${{ secrets.OAUTH_GITHUB_CLIENT_ID }}
      OAUTH_GITHUB_SECRET: ${{ secrets.OAUTH_GITHUB_SECRET }}
      DOMAIN_URL: ${{ secrets.DOMAIN_URL }}
      IMAGE_URL: ${{ secrets.IMAGE_URL }}
      WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
      AWS_ACCESS_KEY: ${{ secrets.AWS_ACCESS_KEY }}
      AWS_SECRET_KEY: ${{ secrets.AWS_SECRET_KEY }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - run: chmod +x ./gradlew
      - name: Run Tests
        run: ./gradlew test

  frontend:
    needs: test  # ✅ 테스트 성공해야 실행
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Docker build & push
        run: |
          docker build --platform linux/amd64 --no-cache \
            --build-arg REACT_APP_BASE_API_URL=${{ secrets.REACT_APP_BASE_API_URL }} \
            --build-arg REACT_APP_WEB_SOCKET_URL=${{ secrets.REACT_APP_WEB_SOCKET_URL }} \
            --build-arg REACT_APP_PROFILE_IMAGE_URL=${{ secrets.REACT_APP_PROFILE_IMAGE_URL }} \
            -t limkanghyun/dev-chat-frontend:latest .
          docker push limkanghyun/dev-chat-frontend:latest

  backend:
    needs: test  # ✅ 테스트 성공해야 실행
    runs-on: ubuntu-latest
    env:
      RDS_USERNAME: ${{ secrets.RDS_USERNAME }}
      RDS_PASSWORD: ${{ secrets.RDS_PASSWORD }}
      RDS_ENDPOINT: ${{ secrets.RDS_ENDPOINT }}
      OAUTH_GITHUB_CLIENT_ID: ${{ secrets.OAUTH_GITHUB_CLIENT_ID }}
      OAUTH_GITHUB_SECRET: ${{ secrets.OAUTH_GITHUB_SECRET }}
      DOMAIN_URL: ${{ secrets.DOMAIN_URL }}
      IMAGE_URL: ${{ secrets.IMAGE_URL }}
      WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
      AWS_ACCESS_KEY: ${{ secrets.AWS_ACCESS_KEY }}
      AWS_SECRET_KEY: ${{ secrets.AWS_SECRET_KEY }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - run: chmod +x ./gradlew
      - run: ./gradlew clean build -x test
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Docker build & push
        run: |
          docker build --platform linux/amd64 --no-cache -t limkanghyun/dev-chat-backend:latest .
          docker push limkanghyun/dev-chat-backend:latest

  deploy:
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    if: github.ref == 'refs/heads/prod'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ap-northeast-2

      - name: Zip deployment files
        run: |
          zip -r deploy.zip deployment scripts appspec.yml docker-compose.yml

      - name: Upload to S3
        run: |
          aws s3 cp deploy.zip s3://devchat-codedeploy-bucket/deploy.zip

      - name: Deploy backend via CodeDeploy
        run: |
          DEPLOYMENT_ID=$(aws deploy create-deployment \
            --application-name devchat-backend \
            --deployment-group-name devchat-deploy-group \
            --s3-location bucket=devchat-codedeploy-bucket,key=deploy.zip,bundleType=zip \
            --file-exists-behavior OVERWRITE \
            --query 'deploymentId' --output text)

          echo "Deployment ID: $DEPLOYMENT_ID"

          aws deploy wait deployment-successful \
            --deployment-id $DEPLOYMENT_ID

          echo "백엔드 배포 완료!"

      - name: Deploy frontend to EC2
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull limkanghyun/dev-chat-frontend:latest
            docker stop dev-chat-frontend || true
            docker rm dev-chat-frontend || true
            cd /home/ubuntu
            docker-compose up -d dev-chat-frontend

            echo "프론트엔드 헬스체크 중..."
            for i in {1..30}; do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3001)
              if [ "$STATUS" == "200" ]; then
                echo "프론트엔드 정상 기동!"
                exit 0
              fi
              echo -n "."
              sleep 2
            done
            echo "프론트엔드 헬스체크 실패!"
            exit 1

      - name: Notify Discord
        if: always()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          status: ${{ job.status }}
          title: "DevChat 배포"
          description: |
            브랜치: ${{ github.ref_name }}
            커밋: ${{ github.event.head_commit.message }}
            배포자: ${{ github.actor }}
          color: ${{ job.status == 'success' && '0x00ff00' || '0xff0000' }}
          username: "DevChat Bot"
