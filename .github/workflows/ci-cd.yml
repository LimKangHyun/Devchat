name: CI/CD
on:
  push:
    branches: [ "prod" ]
  pull_request:
    branches: [ "prod" ]
  workflow_dispatch:

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      RDS_USERNAME: ${{ secrets.RDS_USERNAME }}
      RDS_PASSWORD: ${{ secrets.RDS_PASSWORD }}
      RDS_ENDPOINT: ${{ secrets.RDS_ENDPOINT }}
      OAUTH_GITHUB_CLIENT_ID: ${{ secrets.OAUTH_GITHUB_CLIENT_ID }}
      OAUTH_GITHUB_SECRET: ${{ secrets.OAUTH_GITHUB_SECRET }}
      DOMAIN_URL: ${{ secrets.DOMAIN_URL }}
      IMAGE_URL: ${{ secrets.IMAGE_URL }}
      WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
      AWS_ACCESS_KEY: ${{ secrets.AWS_ACCESS_KEY }}
      AWS_SECRET_KEY: ${{ secrets.AWS_SECRET_KEY }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - run: chmod +x ./gradlew
      - run: ./gradlew clean build -x test
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Docker build & push
        run: |
          docker build --platform linux/amd64 --no-cache -t limkanghyun/dev-chat-backend:latest .
          docker push limkanghyun/dev-chat-backend:latest

  deploy:
    runs-on: ubuntu-latest
    needs: backend
    if: github.ref == 'refs/heads/prod'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ap-northeast-2
      - name: Zip deployment files
        run: |
          zip -r deploy.zip deployment scripts appspec.yml docker-compose.yml
      - name: Upload to S3
        run: |
          aws s3 cp deploy.zip s3://devchat-codedeploy-bucket/deploy.zip
      - name: Deploy via CodeDeploy
        run: |
          aws deploy create-deployment \
            --application-name devchat-backend \
            --deployment-group-name devchat-deploy-group \
            --s3-location bucket=devchat-codedeploy-bucket,key=deploy.zip,bundleType=zip \
            --file-exists-behavior OVERWRITE
